<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in · SwipEd</title>
<link rel="icon" type="image/png" href="assets/logo-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,500,0,0;0,9..144,600,0,0;1,9..144,600,0,0&family=Archivo:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#13203a; --paper:#f7f4ee; --card:#ffffff; --line:#e4ddd0;
    --accent:#e8633a; --accent-ink:#b8431f; --muted:#6b6557; --ok:#1f7a4d; --err:#c0392b;
  }
  *{box-sizing:border-box} body{margin:0;font-family:'Archivo',sans-serif;background:
    radial-gradient(120% 80% at 50% -10%, #fbf8f2 0%, var(--paper) 55%) fixed; color:var(--ink);
    min-height:100vh;display:grid;place-items:center;padding:24px;font-variation-settings:"WONK" 0,"SOFT" 0}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;width:100%;max-width:400px;
    padding:38px 34px;box-shadow:0 24px 60px -30px rgba(19,32,58,.35)}
  .brand{font-family:'Fraunces',serif;font-weight:600;font-size:30px;letter-spacing:-.5px;margin:0 0 2px}
  .brand b{color:var(--accent-ink);font-style:italic;font-weight:600}
  .sub{color:var(--muted);font-size:13.5px;margin:0 0 26px}
  label{display:block;font-size:12.5px;font-weight:600;margin:16px 0 6px;letter-spacing:.2px}
  input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;font-size:15px;
    font-family:inherit;background:#fdfcfa}
  input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,99,58,.15)}
  /* password show/hide */
  .pw-wrap{position:relative}
  .pw-wrap input{padding-right:54px}
  .pw-toggle{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:0;background:none;
    cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;color:var(--accent-ink);padding:6px 8px;width:auto;margin:0}
  .pw-toggle:hover{text-decoration:underline}
  button{width:100%;margin-top:22px;padding:13px;border:0;border-radius:10px;background:var(--ink);color:#fff;
    font-family:inherit;font-weight:600;font-size:15px;cursor:pointer;transition:.15s}
  button:hover{background:#1d2f54} button:disabled{opacity:.6;cursor:default}
  .links{display:flex;justify-content:space-between;margin-top:18px;font-size:12.5px}
  .links a{color:var(--accent-ink);text-decoration:none;cursor:pointer} .links a:hover{text-decoration:underline}
  .msg{margin-top:18px;font-size:13px;padding:11px 13px;border-radius:9px;display:none}
  .msg.ok{display:block;background:#eaf6ef;color:var(--ok)} .msg.err{display:block;background:#fbeae8;color:var(--err)}
  .foot{margin-top:24px;font-size:12.5px;color:var(--muted);text-align:center}
  .foot a{color:var(--accent-ink)}
</style>
</head>
<body>
  <div class="card">
    <h1 class="brand">Swip<b>Ed</b></h1>
    <p class="sub">Sign in to your tutor or parent account.</p>

    <label for="email">Email</label>
    <input id="email" type="email" autocomplete="email" placeholder="you@example.com">
    <label for="pw">Password</label>
    <div class="pw-wrap">
      <input id="pw" type="password" autocomplete="current-password" placeholder="••••••••">
      <button type="button" class="pw-toggle" id="pwToggle" aria-label="Show password" aria-pressed="false">Show</button>
    </div>
    <button id="signin">Sign in</button>

    <div class="links">
      <a id="forgot">Forgot password?</a>
      <a id="resend">Resend confirmation</a>
    </div>
    <div id="msg" class="msg"></div>

    <p class="foot">No account yet? <a href="find-teacher.html">Find a tutor</a> · <a href="become-teacher.html">Become a tutor</a></p>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
  // config.js must define SUPABASE_URL and SUPABASE_ANON_KEY (same keys your forms already use).
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const $ = id => document.getElementById(id);
  const msg = (text, ok=false)=>{ const m=$('msg'); m.textContent=text; m.className='msg '+(ok?'ok':'err'); };

  // If they arrive already signed in (e.g. just clicked the email-confirm link), go straight to the dashboard.
  sb.auth.getSession().then(({data})=>{ if(data.session) location.href='dashboard.html'; });

  $('signin').onclick = async ()=>{
    const email=$('email').value.trim(), password=$('pw').value;
    if(!email||!password){ return msg('Enter your email and password.'); }
    $('signin').disabled=true; msg('Signing in…', true);
    const { error } = await sb.auth.signInWithPassword({ email, password });
    $('signin').disabled=false;
    if(error){ msg(error.message); } else { location.href='dashboard.html'; }
  };

  $('forgot').onclick = async ()=>{
    const email=$('email').value.trim();
    if(!email){ return msg('Type your email first, then tap “Forgot password”.'); }
    const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: location.origin + location.pathname });
    msg(error ? error.message : 'Password reset email sent (if that address exists).', !error);
  };

  $('resend').onclick = async ()=>{
    const email=$('email').value.trim();
    if(!email){ return msg('Type your email first, then tap “Resend confirmation”.'); }
    const { error } = await sb.auth.resend({ type:'signup', email });
    msg(error ? error.message : 'Confirmation email resent. Check your inbox.', !error);
  };

  $('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') $('signin').click(); });

  // show / hide password
  $('pwToggle').onclick = ()=>{
    const f = $('pw'), btn = $('pwToggle');
    const show = f.type === 'password';
    f.type = show ? 'text' : 'password';
    btn.textContent = show ? 'Hide' : 'Show';
    btn.setAttribute('aria-pressed', String(show));
    btn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
    f.focus();
  };
</script>
</body>
</html>
